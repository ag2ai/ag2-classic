name: Bug Report
description: Report a bug in AG2 Classic (maintenance mode)
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **This is AG2 Classic (the `autogen` package), in maintenance mode.**

        We only fix **security issues** and **critical bugs** in existing behaviour. We do **not** add new features or enhancements here — please open those against the actively developed [AG2 repo](https://github.com/ag2ai/ag2).

        For a **security vulnerability**, do **not** file a public issue — follow the private process in [SECURITY.md](https://github.com/ag2ai/ag2classic/blob/main/.github/SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Steps to reproduce the behavior:

        1. Step 1
        2. Step 2
        3. ...
        4. See error
      placeholder: How can we replicate the issue?
  - type: textarea
    id: modelused
    attributes:
      label: Model Used
      description: A description of the model that was used when the error was encountered
      placeholder: gpt-4, mistral-7B etc
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots and logs
      description: If applicable, add screenshots and logs to help explain your problem.
      placeholder: Add screenshots here
  - type: textarea
    id: additional_information
    attributes:
      label: Additional Information
      description: |
        - Package Name & Version: <!-- Specify the package name and version (e.g., autogen v0.7.2) -->
        - Operating System: <!-- Specify the OS (e.g., Windows 10, Ubuntu 20.04) -->
        - Python Version: <!-- Specify the Python version (e.g., 3.9) -->
        - Related Issues: <!-- Link to any related issues here (e.g., #1) -->
        - Any other relevant information.
      placeholder: Any additional details
