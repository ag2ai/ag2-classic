name: PR template check

# Verifies that a pull request description still contains the section headings
# defined in .github/PULL_REQUEST_TEMPLATE.md. The required sections are read
# from the template on the PR's base branch, so this check stays in sync with
# the template automatically — update the template and this check follows.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  template-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check PR description against the template
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('Not a pull_request event; skipping.');
              return;
            }

            // Skip bot authors (e.g. dependabot) — they don't use the PR template.
            const author = pr.user && pr.user.login ? pr.user.login : '';
            if ((pr.user && pr.user.type === 'Bot') || author.endsWith('[bot]')) {
              core.info(`Skipping template check for bot author: ${author}`);
              return;
            }

            const body = pr.body || '';

            // Load required section headings from the template on the base branch.
            const templatePath = '.github/PULL_REQUEST_TEMPLATE.md';
            let templateText = '';
            try {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: templatePath,
                ref: pr.base.sha,
              });
              templateText = Buffer.from(res.data.content, res.data.encoding).toString('utf8');
            } catch (e) {
              core.setFailed(`Could not read ${templatePath} from the base branch: ${e.message}`);
              return;
            }

            // Required sections = every level-2 (##) heading in the template.
            const required = [...templateText.matchAll(/^##\s+(.+?)\s*$/gm)].map(m => m[1].trim());
            if (required.length === 0) {
              core.info('No "##" sections found in the PR template; nothing to enforce.');
              return;
            }

            const normalize = (s) => s.toLowerCase().replace(/\s+/g, ' ').trim();
            const headingsInBody = new Set(
              body.split(/\r?\n/)
                .map((line) => line.match(/^#{1,6}\s+(.+?)\s*$/))
                .filter(Boolean)
                .map((m) => normalize(m[1]))
            );

            const missing = required.filter((h) => !headingsInBody.has(normalize(h)));

            if (missing.length > 0) {
              const list = missing.map((h) => `  - ## ${h}`).join('\n');
              const hint = body.trim() === ''
                ? 'The PR description is empty.'
                : 'The PR description no longer contains all of the template sections.';
              core.setFailed(
                `${hint}\n\n` +
                `Missing required section heading(s):\n${list}\n\n` +
                `Please restore the pull request template and fill it in. ` +
                `The template is at ${templatePath}.`
              );
              return;
            }

            core.info(`All ${required.length} required template section(s) present.`);
