# This workflow builds and uploads the `autogen` Python package to PyPI when a release is published.
# Publishing uses PyPI Trusted Publishing (OIDC) — no API tokens. The trusted publisher must be
# configured on PyPI for (owner=ag2ai, repo=ag2-classic, workflow=python-package.yml, environment=package).
# Conda-forge bot will pick up the new PyPI version and automatically create a new version.

name: python-package

on:
  release:
    types: [published]
  workflow_dispatch: null
permissions: {}
  # actions: read
  # checks: read
  # contents: read
  # deployments: read
jobs:
  deploy:
    strategy:
      matrix:
        os: ['ubuntu-latest']
        python-version: ["3.10"]
    runs-on: ${{ matrix.os }}
    environment: package
    permissions:
      contents: read
      # IMPORTANT: required for PyPI Trusted Publishing (OIDC). No API token needed.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install from source
        # This is required for the prek tests
        shell: pwsh
        run: uv pip install --system -e . wheel "setuptools==58.1.0"
      # - name: Conda list
      #   shell: pwsh
      #   run: conda list
      - name: Build autogen
        shell: pwsh
        run: uv build
      - name: Publish autogen to PyPI
        # Trusted Publishing (OIDC) — authenticates via the PyPI trusted publisher
        # configured for this repo/workflow/environment; no username/password.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
